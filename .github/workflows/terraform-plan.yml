name: Terraform Plan and Apply

on:
  push:
    branches:
      - dev
      - main

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    permissions:
      id-token: write  # Required for OIDC
      contents: read   # For checking out code
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=terraform/${{ github.ref_name }}/terraform.tfstate"

      - name: Select Terraform workspace
        run: |
          terraform workspace select ${{ github.ref_name }} || terraform workspace new ${{ github.ref_name }}

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars"

      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: tiramirez
          minimum-approvals: 1
          issue-title: "Approve Terraform Apply for ${{ github.ref_name }}"
          issue-body: "Approve this issue to apply the Terraform changes to the `${{ github.ref_name }}` workspace."

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -auto-approve
